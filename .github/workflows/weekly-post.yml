name: Weekly LinkedIn draft

# Genera la bozza settimanale del post e la invia su Telegram per revisione.
# Non pubblica nulla su LinkedIn: la pubblicazione resta manuale.

on:
  schedule:
    # 06:30 UTC ogni lunedì = 07:30 CET / 08:30 CEST a Roma.
    - cron: "30 6 * * 1"
  workflow_dispatch: {} # consente l'avvio manuale da GitHub > Actions, per testare

permissions:
  contents: write # serve solo per archiviare la bozza in posts/

concurrency:
  group: weekly-linkedin-draft
  cancel-in-progress: false

jobs:
  generate-draft:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Generate weekly draft and notify on Telegram
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: python scripts/generate_post.py

      - name: Commit generated draft to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posts/
          git diff --cached --quiet || git commit -m "chore: bozza post settimanale ($(date -u +%F))"
          git push
